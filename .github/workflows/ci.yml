name: CI

on:
  pull_request:
    branches: [develop, release-candidate-1, main]
  push:
    branches: [develop, release-candidate-1]

env:
  NODE_ENV: development
  DEV_AUTH_BYPASS: "true"
  PORT: 3001
  SESSION_SECRET: ci-secret-not-used-in-prod
  APP_BASE_URL: http://localhost:3001
  DATABASE_URL: postgresql://toyx:toyx@localhost:5432/toyx_test

jobs:
  quality:
    name: TypeScript + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Production build
        run: npm run build

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: toyx
          POSTGRES_PASSWORD: toyx
          POSTGRES_DB: toyx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run CI test suite
        run: bash scripts/ci-test.sh
        timeout-minutes: 5

  e2e-tests:
    name: E2E + Visual Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: toyx
          POSTGRES_PASSWORD: toyx
          POSTGRES_DB: toyx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Push database schema
        run: npx drizzle-kit push
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run E2E + Visual tests
        run: |
          # Setup test data
          echo "--- Pushing schema ---"
          npx drizzle-kit push 2>&1
          echo "--- Seeding test data ---"
          npx tsx server/seedTest.ts 2>&1
          echo "--- Starting server ---"
          npm run dev:test &
          npx wait-on http://localhost:3001/api/toys --timeout 30000
          echo "--- Verifying dev login ---"
          curl -s -w "\nHTTP %{http_code}\n" http://localhost:3001/api/dev/login/seed_user_1
          echo "--- Running E2E tests ---"
          npx playwright test tests/e2e/ || true
          echo "--- Running visual tests ---"
          npx playwright test tests/visual/ --update-snapshots || true
