name: CI

on:
  pull_request:
    branches: [develop, release-candidate-1, main]
  push:
    branches: [develop, release-candidate-1]

env:
  NODE_ENV: development
  DEV_AUTH_BYPASS: "true"
  PORT: 3001
  SESSION_SECRET: ci-secret-not-used-in-prod
  APP_BASE_URL: http://localhost:3001
  DATABASE_URL: postgresql://toyx:toyx@localhost:5432/toyx_test

jobs:
  quality:
    name: TypeScript + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Production build
        run: npm run build

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: toyx
          POSTGRES_PASSWORD: toyx
          POSTGRES_DB: toyx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Push database schema
        run: npx drizzle-kit push
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Seed test data
        run: npx tsx server/seedTest.ts
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Start test server
        run: |
          npm run dev:test &
          npx wait-on http://localhost:3001/ --timeout 30000

      - name: Verify dev endpoints
        run: |
          curl -s http://localhost:3001/api/dev/login/seed_user_1 | head -100
          curl -s http://localhost:3001/api/toys | head -100

      - name: Run API tests
        run: npm run test:api

  e2e-tests:
    name: E2E + Visual Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: toyx
          POSTGRES_PASSWORD: toyx
          POSTGRES_DB: toyx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Push database schema
        run: npx drizzle-kit push
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Seed test data
        run: npx tsx server/seedTest.ts
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Start test server
        run: |
          npm run dev:test &
          npx wait-on http://localhost:3001/ --timeout 30000

      - name: Verify dev endpoints
        run: |
          curl -s http://localhost:3001/api/dev/login/seed_user_1 | head -100
          curl -s http://localhost:3001/api/toys | head -100

      - name: Run E2E tests
        run: npx playwright test tests/e2e/

      - name: Update visual snapshots (CI baseline)
        run: npx playwright test tests/visual/ --update-snapshots

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
