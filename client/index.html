<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#A855F7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <style>
      .splash { position:fixed; inset:0; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(180deg,#0f0f1a,#1a1040); }
      .splash-logo { width:160px; height:auto; margin-bottom:32px; animation:splash-pulse 2s ease-in-out infinite; }
      .splash-bar { width:192px; height:3px; background:#1f1f3a; border-radius:999px; overflow:hidden; }
      .splash-bar-fill { height:100%; width:30%; background:linear-gradient(90deg,#a855f7,#ec4899); border-radius:999px; animation:splash-slide 1.5s ease-in-out infinite; }
      @keyframes splash-pulse { 0%,100% { opacity:0.7; } 50% { opacity:1; } }
      @keyframes splash-slide { 0% { transform:translateX(-100%); } 100% { transform:translateX(400%); } }
    </style>
  </head>
  <body>
    <div id="splash" class="splash">
      <img src="https://toyxchange.online/assets/toyx-logo.png" alt="ToyX" class="splash-logo" />
      <div class="splash-bar"><div class="splash-bar-fill"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
